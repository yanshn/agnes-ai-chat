// ==================== Video Polling ====================
function toggleSidebar(show) {
  document.getElementById('sidebar').classList.toggle('open', show);
  document.getElementById('overlay').classList.toggle('show', show);
}

async function toggleVideoPause(convId, msgIdx) {
  const conv = conversations.find(c => c.id === convId);
  if (!conv || !conv.messages[msgIdx] || !conv.messages[msgIdx].apiBodies) return;
  const msg = conv.messages[msgIdx];
  msg.apiBodies.videoPaused = !msg.apiBodies.videoPaused;
  await dbPut(conv);
  if (convId === currentConvId) renderAllMessages();
  // 如果恢复自动刷新，立即触发一次
  if (!msg.apiBodies.videoPaused) {
    refreshVideoTask(convId, msgIdx, msg.apiBodies.videoTaskId);
  }
}

async function refreshVideoTask(convId, msgIdx, taskId) {
  const conv = conversations.find(c => c.id === convId);
  if (!conv || !conv.messages[msgIdx]) return;
  const msg = conv.messages[msgIdx];
  if (!msg.apiBodies) return;

  try {
    const videoId = msg.apiBodies.videoId || taskId;
    const queryUrl = `${CONFIG.videoQueryEndpoint}?video_id=${videoId}`;
    const resp = await fetch(queryUrl, {
      headers: { 'Authorization': `Bearer ${getApiKey()}` },
      credentials: 'omit',
      cache: 'no-store',
    });
    const data = await resp.json();
    const respStr = JSON.stringify(data, null, 2);

    msg.apiBodies.videoStatus = data.status;
    msg.apiBodies.videoProgress = data.progress || 0;
    // 更新请求/响应体（刷新查询的请求和响应）
    msg.apiBodies.requestBody = `GET ${queryUrl}`;
    msg.apiBodies.responseBody = respStr;

    if (data.status === 'completed') {
      msg.apiBodies.videoUrl = data.remixed_from_video_id || data.video_url || data.url;
      msg.apiBodies.videoStatus = 'completed';
      msg.text = '\u2705 视频已生成完毕';
    } else if (data.status === 'failed') {
      msg.apiBodies.videoStatus = 'failed';
      msg.isError = true;
      msg.text = '\u274c 视频生成失败';
    } else {
      // 还在排队/进行中 — 30 秒后自动再查（除非已暂停）
      msg.text = '\u2705 视频任务已提交';
      if (!msg.apiBodies.videoPaused) {
        if (msg.apiBodies._autoTimer) clearTimeout(msg.apiBodies._autoTimer);
        msg.apiBodies._autoTimer = setTimeout(() => {
          refreshVideoTask(convId, msgIdx, taskId);
        }, 10000);
      }
    }

    msg.time = new Date().toISOString();
    conv.updatedAt = Date.now();
    await dbPut(conv);
    if (convId === currentConvId) {
      // 局部更新该消息的 bubble 内容，不刷新整个聊天区
      const row = $chatMessages.querySelector(`[data-msg-idx="${msgIdx}"]`);
      if (row) {
        const bubble = row.querySelector('.bubble');
        if (bubble) {
          bubble.innerHTML = buildBubbleContent(msg);
        }
      }
    }
    renderConvList();
  } catch (err) {
    console.error('视频状态查询失败:', err);
  }
}

// ==================== Message Actions ====================
function startEditPrompt(convId, msgIdx) {
  // 防止重复编辑
  const existingTa = document.getElementById('editPromptTextarea');
  if (existingTa) return;

  const conv = conversations.find(c => c.id === convId);
  if (!conv) return;
  const msg = conv.messages[msgIdx];
  if (!msg || msg.role !== 'user') return;
  const row = $chatMessages.querySelector(`[data-msg-idx="${msgIdx}"]`);
  if (!row) return;
  const textEl = row.querySelector('.msg-text');
  if (!textEl) return;

  const originalText = msg.text;
  textEl.classList.add('edit-inline');
  textEl.innerHTML = `<textarea id="editPromptTextarea" rows="4" onclick="event.stopPropagation()">${escapeHtml(originalText)}</textarea>`;

  const ta = document.getElementById('editPromptTextarea');
  requestAnimationFrame(() => {
    ta.focus();
    ta.setSelectionRange(ta.value.length, ta.value.length);
  });

  // 失焦或点击其他地方时自动保存（延迟检查，避免 textarea 内部操作触发）
  ta.addEventListener('blur', () => {
    setTimeout(() => saveEditPrompt(convId, msgIdx), 50);
  });
  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') { cancelEditPrompt(convId, msgIdx, originalText); }
  });
}

async function saveEditPrompt(convId, msgIdx) {
  const ta = document.getElementById('editPromptTextarea');
  if (!ta) return;
  const newText = ta.value.trim();
  if (!newText) return;

  const conv = conversations.find(c => c.id === convId);
  if (!conv) return;
  const msg = conv.messages[msgIdx];
  if (!msg) return;
  msg.text = newText;
  conv.updatedAt = Date.now();
  await dbPut(conv);

  // 更新 DOM
  const row = $chatMessages.querySelector(`[data-msg-idx="${msgIdx}"]`);
  if (row) {
    const bubble = row.querySelector('.bubble');
    if (bubble) { msg._convId = convId; msg._idx = msgIdx; bubble.innerHTML = buildBubbleContent(msg); }
  }
  renderConvList();
}

function cancelEditPrompt(convId, msgIdx, originalText) {
  const row = $chatMessages.querySelector(`[data-msg-idx="${msgIdx}"]`);
  if (row) {
    const textEl = row.querySelector('.edit-inline');
    if (textEl) {
      textEl.classList.remove('edit-inline');
      textEl.innerHTML = originalText;
    }
  }
}

async function copyUserPrompt(convId, msgIdx) {
  const conv = conversations.find(c => c.id === convId);
  if (!conv || !conv.messages[msgIdx]) return;
  const text = conv.messages[msgIdx].text || '';
  try {
    await navigator.clipboard.writeText(text);
  } catch (e) {
    // 降级：execCommand 兼容 file:// 和移动端非安全上下文
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
  }
}

async function deleteMsgPair(convId, msgIdx) {
  if (!confirm('将同时删除此请求和对应的响应消息，确定？')) return;
  const conv = conversations.find(c => c.id === convId);
  if (!conv) return;
  const userMsg = conv.messages[msgIdx];
  if (!userMsg) return;
  // 找到关联的 AI 消息
  const pid = userMsg._msg_id;
  const aiIdx = conv.messages.findIndex(m => m._msg_pid === pid);
  // 从后往前删除，避免索引偏移
  const indices = [msgIdx];
  if (aiIdx >= 0) indices.push(aiIdx);
  indices.sort((a, b) => b - a);
  indices.forEach(i => conv.messages.splice(i, 1));
  conv.updatedAt = Date.now();
  await dbPut(conv);
  if (convId === currentConvId) {
    renderAllMessages();
  }
  renderConvList();
}

async function deleteAiMsg(convId, msgIdx) {
  if (!confirm('确定删除此响应消息？')) return;
  const conv = conversations.find(c => c.id === convId);
  if (!conv) return;
  conv.messages.splice(msgIdx, 1);
  conv.updatedAt = Date.now();
  await dbPut(conv);
  if (convId === currentConvId) {
    renderAllMessages();
  }
  renderConvList();
}

async function regenerateFromUser(convId, msgIdx) {
  // 如果正在编辑提示词，先保存
  const editingTa = document.getElementById('editPromptTextarea');
  if (editingTa) { await saveEditPrompt(convId, msgIdx); }

  const conv = conversations.find(c => c.id === convId);
  if (!conv) return;
  const userMsg = conv.messages[msgIdx];
  if (!userMsg || userMsg.role !== 'user') return;

  // 以本轮次的原始模式重生成（回退兼容旧消息无 _mode 字段）
  const roundMode = userMsg._mode || getChatMode();
  if (roundMode === 'chat') {
    const pid = userMsg._msg_id;
    let aiMsg = conv.messages.find(m => m._msg_pid === pid);
    if (!aiMsg) return;

    // 就地重置 AI 消息
    aiMsg.text = '';
    aiMsg.isError = false;
    const streamId = 'stream_' + Date.now();
    aiMsg.apiBodies = {
      _streaming: true,
      _streamId: streamId,
      _endpoint: CONFIG.chatEndpoint,
    };
    aiMsg.time = new Date().toISOString();
    conv.updatedAt = Date.now();
    await dbPut(conv);

    // 局部更新 DOM：找到现有 AI 行，更新气泡内容（与图片模式再生一致）
    if (convId === currentConvId) {
      const curAiIdx = conv.messages.indexOf(aiMsg);
      const row = $chatMessages.querySelector(`[data-msg-idx="${curAiIdx}"]`);
      if (row) {
        const bubble = row.querySelector('.bubble.ai');
        if (bubble) {
          aiMsg._convId = currentConvId;
          aiMsg._idx = curAiIdx;
          bubble.innerHTML = buildBubbleContent(aiMsg);
        }
      }
    }

    refUrls = [];
    addPendingRequest(currentConvId);

    // 找到当前用户消息在 conv.messages 中的位置（用于截断消息收集）
    const userIdx = conv.messages.indexOf(userMsg);

    // 临时移除旧 AI 构建正确的请求体（避免 buildChatMessages 收集到空 AI）
    const tmpIdx = conv.messages.indexOf(aiMsg);
    conv.messages.splice(tmpIdx, 1);
    const userRefs = userMsg.refImages || [];
    const reqBody = buildRequestBody('', userRefs, userIdx + 1, roundMode);
    conv.messages.splice(tmpIdx, 0, aiMsg);

    // 更新用户消息的请求体
    userMsg.apiBodies = { requestBody: JSON.stringify(reqBody, null, 2), _endpoint: CONFIG.chatEndpoint };
    await dbPut(conv);

    await streamChatResponse(pid, streamId, currentConvId, CONFIG.chatEndpoint, reqBody);
    return;
  }

  // 从原请求体提取参数，但用最新的提示词文本
  let reqParams = {};
  try {
    if (userMsg.apiBodies && userMsg.apiBodies.requestBody) {
      reqParams = JSON.parse(userMsg.apiBodies.requestBody);
    }
  } catch (e) { /* 忽略解析错误 */ }
  reqParams.prompt = userMsg.text;
  // 重新拼接当前窗口的系统提示词（避免使用历史记录中的旧版本）
  const sysKey = roundMode === 'video' ? 'video' : 'image';
  reqParams.prompt = concatSysPrompt(getSysPromptFor(sysKey), userMsg.text);

  addPendingRequest(convId);

  // ═══ 阶段1：先设为 loading 态 ═══
  const isVideo = roundMode === 'video';
  let aiMsg = conv.messages.find(m => m._msg_pid === userMsg._msg_id);

  if (aiMsg) {
    // 更新已有 AI 消息为 loading
    aiMsg.text = isVideo ? '\u23f3 正在创建视频任务…' : '\u23f3 正在重新生成…';
    aiMsg.isError = false;
    aiMsg.genImages = [];
    aiMsg.apiBodies = null;
    aiMsg.time = new Date().toISOString();
    // 清空视频字段
    delete aiMsg.apiBodies?.videoTaskId;
    if (aiMsg.apiBodies) {
      aiMsg.apiBodies.videoTaskId = undefined;
      aiMsg.apiBodies.videoStatus = undefined;
      aiMsg.apiBodies.videoProgress = undefined;
      aiMsg.apiBodies.videoUrl = undefined;
      aiMsg.apiBodies.videoPaused = undefined;
      if (aiMsg.apiBodies._autoTimer) { clearTimeout(aiMsg.apiBodies._autoTimer); aiMsg.apiBodies._autoTimer = undefined; }
    }
  } else {
    // 新建 AI 消息
    aiMsg = {
      role: 'ai',
      text: isVideo ? '\u23f3 正在创建视频任务…' : '\u23f3 正在重新生成…',
      isError: false,
      refImages: [],
      genImages: [],
      time: new Date().toISOString(),
      _msg_pid: userMsg._msg_id,
      apiBodies: null,
    };
    conv.messages.push(aiMsg);
  }

  conv.updatedAt = Date.now();
  await dbPut(conv);

  // 局部更新 DOM
  if (convId === currentConvId) {
    const aiIdx = conv.messages.indexOf(aiMsg);
    const row = $chatMessages.querySelector(`[data-msg-idx="${aiIdx}"]`);
    if (row) {
      const bubble = row.querySelector('.bubble');
      if (bubble) { aiMsg._convId = currentConvId; aiMsg._idx = aiIdx; bubble.innerHTML = buildBubbleContent(aiMsg); }
    } else {
      renderAllMessages();
    }
  }
  renderConvList();

  // ═══ 阶段2：调用 API ═══
  try {
    const endpoint = isVideo ? CONFIG.videoEndpoint : CONFIG.imageEndpoint;
    const reqBodyStr = JSON.stringify(reqParams, null, 2);
    const resp = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getApiKey()}` },
      body: reqBodyStr,
    });
    const data = await resp.json();
    const respStr = JSON.stringify(data, null, 2);

    // 重新获取 aiMsg（可能在 async 间隙中因索引变化而失联）
    aiMsg = conv.messages.find(m => m._msg_pid === userMsg._msg_id);
    if (!aiMsg) return;

    // 更新 user 消息块的请求体（提示词可能已被编辑）
    userMsg.apiBodies.requestBody = reqBodyStr;

    aiMsg.apiBodies = {
      requestBody: reqBodyStr,
      responseBody: respStr,
      _endpoint: endpoint,
    };
    aiMsg.isError = false;
    aiMsg.genImages = [];
    aiMsg.time = new Date().toISOString();

    if (isVideo) {
      const taskId = data.task_id;
      const videoId = data.video_id;
      if (taskId) {
        aiMsg.text = '\u2705 视频任务已提交';
        aiMsg.apiBodies.videoTaskId = taskId;
        aiMsg.apiBodies.videoId = videoId || taskId;
        aiMsg.apiBodies.videoStatus = 'queued';
        aiMsg.apiBodies.videoProgress = 0;
        // 30 秒后自动轮询
        if (convId === currentConvId) {
          const idx = conv.messages.indexOf(aiMsg);
          aiMsg.apiBodies._autoTimer = setTimeout(() => {
            refreshVideoTask(convId, idx, taskId);
          }, 10000);
        }
      } else {
        aiMsg.text = '\u26a0\ufe0f 视频任务创建失败，未返回 task_id';
        aiMsg.isError = true;
      }
    } else {
      const imgArray = data.data;
      if (imgArray && imgArray.length > 0) {
        const genUrls = imgArray.map(i => i.url).filter(Boolean);
        aiMsg.genImages = genUrls;
        aiMsg.text = genUrls.length > 1 ? `\u2705 已为你生成 ${genUrls.length} 张图像：` : '\u2705 已为你生成图像：';
      } else {
        aiMsg.text = '\u26a0\ufe0f API 返回了空结果。';
        aiMsg.isError = true;
      }
    }

    conv.updatedAt = Date.now();
    await dbPut(conv);
    removePendingRequest(convId);

    if (convId === currentConvId) {
      const aiIdx = conv.messages.indexOf(aiMsg);
      const row = $chatMessages.querySelector(`[data-msg-idx="${aiIdx}"]`);
      if (row) {
        const bubble = row.querySelector('.bubble');
        if (bubble) { aiMsg._convId = currentConvId; aiMsg._idx = aiIdx; bubble.innerHTML = buildBubbleContent(aiMsg); }
      } else {
        renderAllMessages();
      }
    }
    renderConvList();
  } catch (err) {
    removePendingRequest(convId);
    console.error('重新生成失败:', err);
    // 更新 AI 消息为错误
    aiMsg = conv.messages.find(m => m._msg_pid === userMsg._msg_id);
    if (aiMsg) {
      aiMsg.text = '\u274c 重新生成失败：' + (err.message || '未知错误');
      aiMsg.isError = true;
      aiMsg.genImages = [];
      aiMsg.time = new Date().toISOString();
      conv.updatedAt = Date.now();
      await dbPut(conv);
      if (convId === currentConvId) {
        const aiIdx = conv.messages.indexOf(aiMsg);
        const row = $chatMessages.querySelector(`[data-msg-idx="${aiIdx}"]`);
        if (row) {
          const bubble = row.querySelector('.bubble');
          if (bubble) { aiMsg._convId = currentConvId; aiMsg._idx = aiIdx; bubble.innerHTML = buildBubbleContent(aiMsg); }
        } else {
          renderAllMessages();
        }
      }
      renderConvList();
    }
  }
}

// Configure marked.js
marked.setOptions({
  breaks: true,
  gfm: true,
});

// ==================== Helpers ====================
function openLightbox(url) { $lightboxImg.src = url; $lightbox.classList.add('active'); }

function toggleCodeBlock(id) {
  const block = document.getElementById(id);
  const arrow = document.getElementById(id + '-arrow');
  if (!block || !arrow) return;
  const open = block.classList.toggle('open');
  arrow.classList.toggle('open', open);
  arrow.innerHTML = open ? '&#9660;' : '&#9654;';
}

function toggleThinkingBlock(id) {
  const content = document.getElementById(id);
  const arrow = document.getElementById(id + '-arrow');
  if (!content || !arrow) return;
  content.classList.toggle('open');
  arrow.classList.toggle('open');
}

function formatTime(d) {
  return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escapeAttr(s) { return (s || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function codeId() { return 'cb-' + Math.random().toString(36).slice(2,8); }
function copyText(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text);
  } else {
    const ta = document.createElement('textarea');
    ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  }
}
// 复制 AI 消息内容（从 DOM 提取，自动排除 thinking 区块）
function copyAiMessage(btn) {
  const row = btn.closest('.message-row');
  if (!row) return;
  const idx = parseInt(row.getAttribute('data-msg-idx'));
  const conv = getCurrentConv();
  if (!conv || isNaN(idx) || !conv.messages[idx]) return;
  const rawText = conv.messages[idx].text || '';
  if (!rawText) return;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(rawText);
  } else {
    const ta = document.createElement('textarea');
    ta.value = rawText; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  }
  const origHTML = btn.innerHTML;
  btn.innerHTML = '&#x2705; 已复制';
  setTimeout(() => { btn.innerHTML = origHTML; }, 1500);
}

// 复制生图/生视频的 URL
function copyGenUrl(btn) {
  const row = btn.closest('.message-row');
  if (!row) return;
  const idx = parseInt(row.getAttribute('data-msg-idx'));
  const conv = getCurrentConv();
  if (!conv || isNaN(idx) || !conv.messages[idx]) return;
  const msg = conv.messages[idx];
  let url = '';
  // 图片 URL
  if (msg.genImages && msg.genImages.length > 0) {
    url = msg.genImages[0];
  }
  // 视频 URL
  if (!url && msg.apiBodies?.videoUrl) {
    url = msg.apiBodies.videoUrl;
  }
  if (!url) return;
  if (navigator.clipboard) {
    navigator.clipboard.writeText(url);
  } else {
    const ta = document.createElement('textarea');
    ta.value = url; ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta); ta.select();
    document.execCommand('copy'); document.body.removeChild(ta);
  }
  const origHTML = btn.innerHTML;
  btn.innerHTML = '&#x2705; 已复制';
  setTimeout(() => { btn.innerHTML = origHTML; }, 1500);
}

function autoResizeTextarea() {
  $promptInput.style.height = 'auto';
  $promptInput.style.height = Math.min($promptInput.scrollHeight, 150) + 'px';
}

init();
