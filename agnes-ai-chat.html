<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agnes工坊</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg-primary: #1a1a2e;
    --bg-secondary: #16213e;
    --bg-tertiary: #0f3460;
    --bg-input: #1e2a3a;
    --bg-bubble-user: #1a5c8a;
    --bg-bubble-ai: #1e2a3a;
    --text-primary: #e0e0e0;
    --text-secondary: #9ca3af;
    --text-muted: #6b7280;
    --accent: #4ea8de;
    --accent-hover: #3d8ec0;
    --accent-glow: rgba(78,168,222,0.3);
    --border: #2a3a50;
    --error: #e0556a;
    --success: #4caf84;
    --radius: 14px;
    --radius-sm: 8px;
    --transition: 0.2s ease;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    height: 100vh;
    overflow: hidden;
    display: flex;
  }

  /* ===== Sidebar ===== */
  .sidebar {
    width: 300px; min-width: 300px;
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-logo {
    display: flex; align-items: center; gap: 10px;
    font-size: 16px; font-weight: 700; color: var(--accent);
    padding: 16px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .sidebar-logo svg { width: 28px; height: 28px; flex-shrink: 0; }

  /* 对话列表区 */
  .conv-list-area {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    display: flex; flex-direction: column;
  }
  .conv-list-area::-webkit-scrollbar { width: 4px; }
  .conv-list-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .conv-list-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px 6px;
  }
  .conv-list-header span {
    font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-muted);
  }
  .btn-new-conv {
    display: flex; align-items: center; gap: 4px;
    padding: 6px 12px;
    border: 1px solid var(--accent);
    border-radius: var(--radius-sm);
    background: transparent;
    color: var(--accent);
    font-size: 12px; cursor: pointer;
    transition: var(--transition);
    white-space: nowrap;
  }
  .btn-new-conv:hover { background: rgba(78,168,222,0.15); }

  .conv-list { display: flex; flex-direction: column; padding: 4px 8px; }

  .conv-item {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 12px; border-radius: var(--radius-sm);
    cursor: pointer; transition: var(--transition);
    font-size: 13px; color: var(--text-secondary);
    position: relative;
  }
  .conv-item:hover { background: rgba(78,168,222,0.08); }
  .conv-item.active { background: rgba(78,168,222,0.15); color: var(--text-primary); }
  .conv-item .conv-icon {
    width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0;
    transition: background 0.3s;
  }
  .conv-item .conv-icon.idle { background: var(--success); }
  .conv-item .conv-icon.loading { background: #e8a838; animation: pulse 1.2s ease-in-out infinite; }
  .conv-item .conv-icon.error { background: var(--error); }
  .conv-item .conv-name {
    flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .conv-item .conv-name-input {
    flex: 1; padding: 2px 6px; border: 1px solid var(--accent);
    border-radius: 4px; background: var(--bg-input); color: var(--text-primary);
    font-size: 13px; font-family: inherit; outline: none;
  }

  .no-convs {
    padding: 20px; text-align: center; color: var(--text-muted); font-size: 13px;
  }

  /* 设置区（折叠） */
  .settings-toggle {
    display: flex; align-items: center; gap: 6px;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    cursor: pointer; user-select: none;
    font-size: 12px; color: var(--text-muted); transition: var(--transition);
    flex-shrink: 0;
  }
  .settings-toggle:hover { color: var(--text-primary); }
  .settings-toggle .arrow { font-size: 10px; transition: transform 0.2s; }
  .settings-toggle .arrow.open { transform: rotate(90deg); }

  .settings-panel {
    display: none; flex-direction: column; gap: 10px;
    padding: 0 16px 16px;
    border-top: 1px solid var(--border);
    overflow-y: auto; max-height: 70vh;
    flex-shrink: 1;
  }
  .settings-panel.open { display: flex; }
  .sidebar-section { display: flex; flex-direction: column; gap: 4px; }
  .sidebar input[type="range"] {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px; border-radius: 2px;
    background: var(--border); outline: none; cursor: pointer;
    padding: 0; border: none;
  }
  .sidebar input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--accent); cursor: pointer;
    border: 2px solid var(--bg-primary);
  }
  /* Toggle switch */
  .toggle-label {
    display: flex !important; align-items: center; justify-content: space-between;
    cursor: pointer; user-select: none; font-size: 10px;
    text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted);
    flex-direction: row; width: 100%;
  }
  .toggle-input { display: none; }
  .toggle-slider {
    position: relative; width: 36px; height: 20px; flex-shrink: 0;
    background: var(--border); border-radius: 10px;
    transition: background 0.2s;
  }
  .toggle-slider::before {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 16px; height: 16px; border-radius: 50%;
    background: var(--bg-primary); transition: transform 0.2s;
  }
  .toggle-input:checked + .toggle-slider {
    background: var(--accent);
  }
  .toggle-input:checked + .toggle-slider::before {
    transform: translateX(16px);
  }
  .sidebar-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 1px;
    color: var(--text-muted);
  }
  .sidebar-group-title {
    font-size: 12px; font-weight: 600; color: var(--text-primary);
    margin: 0 0 0 0; padding: 4px 0;
  }
  .sidebar input, .sidebar select {
    width: 100%; padding: 8px 10px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--bg-input); color: var(--text-primary);
    font-size: 12px; outline: none; transition: border var(--transition);
  }
  .sidebar input:focus, .sidebar select:focus, .sidebar textarea:focus {
    border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow);
  }
  .sidebar textarea {
    width: 100%; padding: 10px 12px; resize: vertical;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--bg-input); color: var(--text-primary);
    font-size: 13px; font-family: inherit; line-height: 1.5;
    outline: none; transition: border var(--transition);
  }
  .sidebar textarea::placeholder { color: var(--text-muted); }
  .api-key-wrapper { position: relative; }
  .api-key-wrapper input { padding-right: 38px; }
  .toggle-key {
    position: absolute; right: 4px; top: 50%; transform: translateY(-50%);
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; padding: 4px; font-size: 13px;
  }
  .toggle-key:hover { color: var(--accent); }

  .sidebar-hint {
    font-size: 10px; color: var(--text-muted); line-height: 1.5;
    padding: 6px 8px; background: var(--bg-primary);
    border-radius: 4px; border-left: 3px solid var(--accent);
  }
  .sidebar-hint a { color: var(--accent); text-decoration: none; }
  .sidebar-hint a:hover { text-decoration: underline; }

  /* ===== Main ===== */
  .main {
    flex: 1; display: flex; flex-direction: column; min-width: 0;
  }
  .chat-header {
    padding: 14px 24px; border-bottom: 1px solid var(--border);
    background: var(--bg-secondary); font-size: 14px; font-weight: 600;
    color: var(--text-secondary); display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
  }
  .header-actions {
    margin-left: auto; display: flex; gap: 6px; flex-shrink: 0;
  }
  .header-actions button:hover { color: var(--accent); border-color: var(--accent); }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
  .status-dot.offline { background: var(--text-muted); }
  .status-dot.loading { background: #e8a838; animation: pulse 1.2s ease-in-out infinite; }
  .status-dot.error { background: var(--error); }

  .chat-messages {
    flex: 1; overflow-y: auto; padding: 20px 24px;
    display: flex; flex-direction: column; gap: 20px;
  }
  .chat-messages::-webkit-scrollbar { width: 6px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .welcome {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; height: 100%; text-align: center;
    gap: 12px; opacity: 0.7; padding: 40px;
  }
  .welcome svg { width: 64px; height: 64px; opacity: 0.5; margin-bottom: 8px; }
  .welcome h2 { font-size: 22px; font-weight: 600; }
  .welcome p { font-size: 14px; color: var(--text-secondary); max-width: 480px; line-height: 1.6; }

  .message-row { display: flex; gap: 12px; animation: fadeIn 0.3s ease; }
  .message-row.user { justify-content: flex-end; }
  .message-row.ai { justify-content: flex-start; }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0; align-self: flex-start;
  }
  .avatar.user-avatar { background: var(--accent); order: 2; }
  .avatar.ai-avatar { background: var(--bg-tertiary); }

  .bubble {
    max-width: 99%; padding: 14px 18px; border-radius: var(--radius);
    position: relative; word-break: break-word;
  }
  .bubble.user { background: var(--bg-bubble-user); border-bottom-right-radius: 4px; }
  .bubble.ai { background: var(--bg-bubble-ai); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
  .bubble .msg-text { font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
  .bubble .ref-images { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
  .bubble .ref-images img, .bubble .gen-image {
    max-width: 320px; max-height: 320px; border-radius: var(--radius-sm);
    object-fit: contain; background: #0a0a1a; cursor: pointer;
    transition: transform var(--transition);
  }
  .bubble .ref-images img:hover, .bubble .gen-image:hover { transform: scale(1.02); }
  .bubble .ref-images img { max-width: 140px; max-height: 100px; }
  .bubble .gen-image-wrapper {
    margin-top: 10px; display: flex; flex-direction: column;
    align-items: flex-start; gap: 6px;
  }
  .bubble .gen-label {
    font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;
  }
  .bubble .msg-time { font-size: 10px; color: var(--text-muted); margin-top: 6px; }

  /* Chat bubbles */
  .chat-bubble {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: var(--radius); line-height: 1.6;
    font-size: 14px; word-break: break-word; margin-bottom: 4px;
  }
  .chat-bubble-user {
    margin-left: auto; margin-right: 12px;
    background: var(--accent); color: #fff;
  }
  .chat-bubble-ai {
    margin-right: auto; margin-left: auto;
    background: var(--bg-secondary); color: var(--text-primary);
  }
  .stream-cursor {
    display: inline-block; animation: blink 1s step-end infinite;
    color: var(--text-muted); font-weight: 700;
  }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

  /* Thinking block */
  .thinking-block {
    margin-bottom: 10px; border-radius: var(--radius-sm);
    background: rgba(78,168,222,0.08); border: 1px solid rgba(78,168,222,0.2);
    overflow: hidden;
  }
  .thinking-header {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 10px; cursor: pointer; user-select: none;
    font-size: 12px; color: var(--accent); transition: background 0.2s;
  }
  .thinking-header:hover { background: rgba(78,168,222,0.1); }
  .thinking-header .arrow { font-size: 10px; transition: transform 0.2s; }
  .thinking-header .arrow.open { transform: rotate(90deg); }
  .thinking-header .icon { font-size: 14px; }
  .thinking-header .count { font-size: 10px; color: var(--text-muted); }
  .thinking-content {
    display: none; padding: 8px 12px 10px 32px;
    font-size: 12px; line-height: 1.6; color: var(--text-secondary);
    border-top: 1px solid rgba(78,168,222,0.1);
    max-height: 300px; overflow-y: auto;
  }
  .thinking-content.open { display: block; max-height: 15em; }
  .thinking-content::-webkit-scrollbar { width: 4px; }
  .thinking-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Markdown rendered content */
  .md-content { font-size: 14px; line-height: 1.7; }
  .md-content p { margin: 0 0 8px 0; }
  .md-content p:last-child { margin-bottom: 0; }
  .md-content h1, .md-content h2, .md-content h3, .md-content h4 {
    margin: 12px 0 6px 0; color: var(--text-primary); font-weight: 600;
  }
  .md-content h1 { font-size: 18px; }
  .md-content h2 { font-size: 16px; }
  .md-content h3 { font-size: 14px; }
  .md-content ul, .md-content ol { margin: 6px 0; padding-left: 20px; }
  .md-content li { margin: 3px 0; }
  .md-content code {
    background: rgba(78,168,222,0.1); padding: 2px 5px; border-radius: 3px;
    font-family: 'Cascadia Code','Fira Code',Consolas,monospace; font-size: 12px;
  }
  .md-content pre {
    background: #0d1117; border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 10px 12px; margin: 8px 0; overflow-x: auto; font-size: 12px;
  }
  .md-content pre code { background: none; padding: 0; }
  .md-content blockquote {
    margin: 8px 0; padding: 6px 12px; border-left: 3px solid var(--accent);
    background: rgba(78,168,222,0.05); color: var(--text-secondary);
  }
  .md-content a { color: var(--accent); text-decoration: none; }
  .md-content a:hover { text-decoration: underline; }
  .md-content table { border-collapse: collapse; margin: 8px 0; width: 100%; }
  .md-content th, .md-content td { border: 1px solid var(--border); padding: 6px 10px; }
  .md-content th { background: rgba(78,168,222,0.1); }
  .md-content hr { border: none; border-top: 1px solid var(--border); margin: 12px 0; }

  .msg-meta { margin-left: 12px; }
  .msg-action-btn {
    background: none; border: 0.5px solid var(--border);
    color: var(--text-muted); cursor: pointer;
    padding: 3px 8px; border-radius: var(--radius-sm);
    font-size: 11px; transition: var(--transition);
  }
  .msg-action-btn:hover { color: var(--text-primary); border-color: var(--accent); }

  /* Code blocks */
  .code-toggle {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; margin-top: 10px; border-radius: var(--radius-sm);
    background: rgba(78,168,222,0.1); color: var(--accent);
    cursor: pointer; font-size: 11px; border: none; user-select: none;
    transition: var(--transition);
  }
  .code-toggle:hover { background: rgba(78,168,222,0.2); }
  .code-toggle .arrow { display: inline-block; transition: transform 0.2s; font-size: 10px; }
  .code-toggle .arrow.open { transform: rotate(90deg); }
  .code-block {
    display: none; margin-top: 6px; padding: 10px 14px;
    background: #0d1117; border: 1px solid var(--border);
    border-radius: var(--radius-sm); font-family: 'Cascadia Code','Fira Code',Consolas,monospace;
    font-size: 11px; line-height: 1.5; color: #c9d1d9;
    white-space: pre-wrap; word-break: break-all;
    max-height: 300px; overflow-y: auto;
  }
  .code-block.open { display: block; }
  .code-block::-webkit-scrollbar { width: 4px; }
  .code-block::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .code-label { font-size: 10px; color: var(--text-muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }

  .typing-dots { display: flex; gap: 4px; padding: 8px 0; }
  .typing-dots span {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text-muted); animation: bounce 1.4s ease-in-out infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
  .bubble.error { background: rgba(224,85,106,0.1); border: 1px solid var(--error); }
  .bubble.error .msg-text { color: var(--error); font-size: 13px; }

  .chat-bubble { max-width: 99%; }
  .edit-inline { width: 75vw; min-width: 350px; max-width: 650px; box-sizing: border-box; }
  .edit-inline textarea { width: 100%; min-height: 120px; padding: 12px 14px; border: 2px solid var(--accent); border-radius: var(--radius-sm); background: var(--bg-primary); color: var(--text-primary); font-size: 15px; line-height: 1.6; font-family: inherit; resize: vertical; box-sizing: border-box; }

  /* Message action buttons */
  .msg-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 6px; }
  .msg-actions button {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--bg-secondary); color: var(--text-muted);
    cursor: pointer; font-size: 13px; transition: var(--transition);
  }
  .msg-actions .btn-act:hover { color: var(--accent); border-color: var(--accent); }
  .msg-actions .btn-del:hover { color: var(--error); border-color: var(--error); }

  /* Compact info bar: time on left, buttons on right */
  .msg-compact-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 4px; gap: 8px;
  }

  /* Video task */
  .video-task { margin-top: 8px; display: flex; flex-direction: column; gap: 8px; }
  .video-progress-bar {
    width: 100%; height: 6px; border-radius: 3px; background: var(--border); overflow: hidden;
  }
  .video-progress-fill {
    height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.5s;
  }
  .btn-video-refresh {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 6px 14px; border: 1px solid var(--accent); border-radius: var(--radius-sm);
    background: rgba(78,168,222,0.1); color: var(--accent);
    cursor: pointer; font-size: 12px; transition: var(--transition);
  }
  .btn-video-refresh:hover { background: rgba(78,168,222,0.2); }
  .btn-video-refresh:disabled { opacity: 0.5; cursor: not-allowed; }
  .video-player {
    max-width: 480px; border-radius: var(--radius-sm); overflow: hidden; background: #000;
  }
  .video-player video { width: 100%; display: block; }

  /* Input */
  .input-area {
    padding: 16px 24px; border-top: 1px solid var(--border);
    background: var(--bg-secondary); display: flex; gap: 10px; align-items: flex-end;
    flex-shrink: 0;
  }
  .input-wrapper { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .input-wrapper textarea {
    width: 100%; resize: none; padding: 12px 16px;
    border: 1px solid var(--border); border-radius: var(--radius);
    background: var(--bg-input); color: var(--text-primary);
    font-size: 14px; font-family: inherit; line-height: 1.5;
    outline: none; min-height: 46px; max-height: 150px;
    transition: border var(--transition); overflow-y: auto;
  }
  .input-wrapper textarea:focus {
    border-color: var(--accent); box-shadow: 0 0 0 2px var(--accent-glow);
  }
  .input-wrapper textarea::placeholder { color: var(--text-muted); }

  .ref-url-row { display: flex; gap: 6px; align-items: flex-start; }
  .ref-url-row input[type="text"] {
    width: 450px; flex: none; padding: 8px 12px; border: 1px solid var(--border);
    border-radius: var(--radius-sm); background: var(--bg-input);
    color: var(--text-primary); font-size: 12px; font-family: inherit;
    outline: none; transition: border var(--transition);
    line-height: 1.5; height: 34px;
  }
  .ref-url-row input[type="text"]:focus { border-color: var(--accent); }
  .ref-url-tag {
    display: inline-flex; align-items: center; gap: 3px;
    position: relative; flex-shrink: 0;
  }
  .ref-url-tag .ref-thumb {
    width: 44px; height: 34px; border-radius: 4px;
    object-fit: cover; border: 1px solid var(--border);
    cursor: pointer;
  }
  .ref-url-tag .ref-thumb:hover { border-color: var(--accent); }
  .ref-url-tag .ref-del {
    position: absolute; top: -6px; right: -6px;
    width: 16px; height: 16px; border-radius: 50%;
    background: #1a1a2e; border: 1px solid var(--border);
    color: var(--text-muted); cursor: pointer;
    font-size: 10px; display: flex; align-items: center; justify-content: center;
    line-height: 1; transition: var(--transition);
  }
  .ref-url-tag .ref-del:hover { color: var(--error); border-color: var(--error); }

  .btn-send {
    width: 46px; height: 46px; border-radius: 50%; border: none;
    background: var(--accent); color: #fff; cursor: pointer;
    font-size: 18px; display: flex; align-items: center; justify-content: center;
    transition: var(--transition); flex-shrink: 0; align-self: flex-start; margin-bottom: 2px;
  }
  .btn-send:hover { background: var(--accent-hover); transform: scale(1.05); }
  .btn-send:disabled { background: var(--border); cursor: not-allowed; transform: none; }
  .btn-send svg { width: 20px; height: 20px; }

  .lightbox {
    display: none; position: fixed; inset: 0;

<script>
// ==================== IndexedDB ====================
const DB_NAME = 'agnes_chat_db';
const DB_VERSION = 1;
const STORE_NAME = 'conversations';

function openDB() {
  return new Promise((resolve, reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  });
}

async function dbGetAll() {
  const db = await openDB();
  return new Promise((resolve) => {
    const tx = db.transaction(STORE_NAME, 'readonly');
    const req = tx.objectStore(STORE_NAME).getAll();
    req.onsuccess = () => resolve(req.result || []);
    tx.oncomplete = () => db.close();
  });
}

async function dbPut(conv) {
  const db = await openDB();
  return new Promise((resolve) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).put(conv);
    tx.oncomplete = () => { db.close(); resolve(); };
  });
}

async function dbDelete(id) {
  const db = await openDB();
  return new Promise((resolve) => {
    const tx = db.transaction(STORE_NAME, 'readwrite');
    tx.objectStore(STORE_NAME).delete(id);
    tx.oncomplete = () => { db.close(); resolve(); };
  });
}

// ==================== State ====================
const CONFIG = {
  imageEndpoint: 'https://apihub.agnes-ai.com/v1/images/generations',
  videoEndpoint: 'https://apihub.agnes-ai.com/v1/videos',
  videoQueryEndpoint: 'https://apihub.agnes-ai.com/agnesapi',
  chatEndpoint: 'https://apihub.agnes-ai.com/v1/chat/completions',
};

let conversations = [];      // [{ id, name, messages, createdAt, updatedAt }]
let currentConvId = null;
let apiKey = '';
const DEFAULT_API_KEY = 'sk-CiADGDKSQUY5exB5ZWFYE1tfCnN7DAFQ5I8bapJHJGM8vvyP';

function getApiKey() {
  return apiKey || DEFAULT_API_KEY;
}
let currentAbortController = null;  // 流式请求的 AbortController
let refUrls = [];
let convPendingRequests = {};  // { convId: count } — pending 请求计数，0=idle，>0=loading

// ==================== DOM ====================
const $apikey       = document.getElementById('apikey');
const $sizeSelect   = document.getElementById('sizeSelect');
const $seedInput    = document.getElementById('seedInput');
const $imageModel   = document.getElementById('imageModel');
const $videoModel   = document.getElementById('videoModel');
const $videoRes     = document.getElementById('videoRes');
const $btnPickImage = document.getElementById('btnPickImage');
const $refFileInput = document.getElementById('refFileInput');
const $promptInput  = document.getElementById('promptInput');
const $refUrlInput  = document.getElementById('refUrlInput');
const $refUrlTags   = document.getElementById('refUrlTags');
const $btnSend      = document.getElementById('btnSend');
const $chatMessages = document.getElementById('chatMessages');
const $statusDot    = document.getElementById('statusDot');
const $statusText   = document.getElementById('statusText');
const $convNameDisp = document.getElementById('convNameDisplay');
const $lightbox     = document.getElementById('lightbox');
const $lightboxImg  = document.getElementById('lightboxImg');
const $convList     = document.getElementById('convList');
const $chatModel    = document.getElementById('chatModel');
const $sysText      = document.getElementById('sysText');
const $sysImage     = document.getElementById('sysImage');
const $sysVideo     = document.getElementById('sysVideo');
const $chatTemp     = document.getElementById('chatTemp');
const $chatMaxTokens = document.getElementById('chatMaxTokens');
const $chatThinking = document.getElementById('chatThinking');
const $chatRounds   = document.getElementById('chatRounds');
const $chatRoundsVal = document.getElementById('chatRoundsVal');

// ==================== Conversation helpers ====================
function getCurrentConv() {
  return conversations.find(c => c.id === currentConvId) || null;
}

function getMessages() {
  const conv = getCurrentConv();
  return conv ? conv.messages : [];
}

function setMessages(msgs) {
  const conv = getCurrentConv();
  if (conv) {
    conv.messages = msgs;
    conv.updatedAt = Date.now();
  }
}

async function saveCurrentConv() {
  const conv = getCurrentConv();
  if (conv) await dbPut(conv);
}

function makeConvId() {
  return 'conv_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
}

function defaultConvName() {
  return '新对话 ' + new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

async function createConversation(activate = true) {
  const conv = {
    id: makeConvId(),
    name: defaultConvName(),
    messages: [],
    createdAt: Date.now(),
    updatedAt: Date.now(),
    _sysPrompts: {
      text:  localStorage.getItem('agnes_sys_text')  || '',
      image: localStorage.getItem('agnes_sys_image') || '',
      video: localStorage.getItem('agnes_sys_video') || '',
    },
  };
  await dbPut(conv);
  conversations.push(conv);
  renderConvList();
  if (activate) switchConversation(conv.id);
}

async function switchConversation(id) {
  if (id === currentConvId) return;
  // 检查是否有进行中的请求
  if (convPendingRequests[currentConvId] > 0) {
    if (!confirm('当前对话正在进行中，切换可能导致图片/对话/视频显示错误，确定切换吗？')) return;
  }
  // 中断流式请求
  if (currentAbortController) { currentAbortController.abort(); currentAbortController = null; }
  // 保存当前
  if (currentConvId && getCurrentConv()) {
    await saveCurrentConv();
  }
  currentConvId = id;
  updateChatModeUI();
  refUrls = [];
  $promptInput.value = '';
  $refUrlInput.value = '';
  $promptInput.style.height = 'auto';
  renderRefTags();
  renderConvList();
  renderAllMessages();
  updateConvNameDisplay();
  updateStatus();
  scrollToBottom();
  // 移动端切换对话后自动关闭侧边栏
  if (window.innerWidth < 768) toggleSidebar(false);
}

function updateConvNameDisplay() {
  const conv = getCurrentConv();
  $convNameDisp.textContent = conv ? conv.name : '—';
}

async function deleteConversation(id) {
  const conv = conversations.find(c => c.id === id);
  if (!conv) return;
  const name = conv.name || '未命名对话';
  if (!confirm(`确定要删除「${name}」吗？此操作不可恢复。`)) return;

  await dbDelete(id);
  conversations = conversations.filter(c => c.id !== id);

  if (id === currentConvId) {
    // 切到下一个，没有则新建
    if (conversations.length > 0) {
      currentConvId = conversations[0].id;
    } else {
      currentConvId = null;
      await createConversation(true);
      return;
    }
  }
  renderConvList();
  renderAllMessages();
}

async function renameConversation(id, newName) {
  const name = newName.trim();
  if (!name) return;
  const conv = conversations.find(c => c.id === id);
  if (conv) {
    conv.name = name;
    conv.updatedAt = Date.now();
    await dbPut(conv);
    renderConvList();
    if (id === currentConvId) updateConvNameDisplay();
  }
}

// ==================== Conv List Rendering ====================
function renderConvList() {
  // 按更新时间倒序
  const sorted = [...conversations].sort((a, b) => b.updatedAt - a.updatedAt);

  if (sorted.length === 0) {
    $convList.innerHTML = '<div class="no-convs">暂无对话，点击上方「+ 新建」开始</div>';
    return;
  }

  $convList.innerHTML = sorted.map(c => {
    const active = c.id === currentConvId ? ' active' : '';
    const name = escapeHtml(c.name || '未命名');
    const msgCount = c.messages ? c.messages.length : 0;
    const sub = msgCount > 0 ? `${msgCount} 条消息` : '空对话';
    const state = getConvState(c.id);
    const stateTitle = state === 'loading' ? '等待响应' : state === 'error' ? '请求异常' : '空闲';
    return `
      <div class="conv-item${active}" data-id="${c.id}" onclick="switchConversation('${c.id}')" ondblclick="startRename('${c.id}')">
        <span class="conv-icon ${state}" title="${stateTitle}"></span>
        <div>
          <div class="conv-name">${name}</div>
          <div style="font-size:10px;color:var(--text-muted);margin-top:2px">${escapeHtml(sub)}</div>
        </div>
      </div>`;
  }).join('');
}

function startRename(id) {
  const conv = conversations.find(c => c.id === id);
  if (!conv) return;
  const item = $convList.querySelector(`[data-id="${id}"]`);
  if (!item) return;
  const nameDiv = item.querySelector('.conv-name');
  if (!nameDiv) return;
  const oldName = conv.name;
  nameDiv.innerHTML = `<input class="conv-name-input" value="${escapeHtml(oldName)}" />`;
  const input = nameDiv.querySelector('input');
  input.focus();
  input.select();

  const finish = () => {
    const newName = input.value.trim();
    if (newName && newName !== oldName) {
      renameConversation(id, newName);
    } else {
      renderConvList();
    }
  };

  input.addEventListener('blur', finish);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); input.blur(); }
    if (e.key === 'Escape') {
      input.value = oldName;
      input.blur();
    }
  });
}

}

// ==================== Chat 模式 ====================
function getChatMode() {
  const conv = getCurrentConv();
  return (conv && conv.chatMode) ? conv.chatMode : 'image';
}

// 获取某条消息的生成模式：
// - user 消息直接读 _mode
// - AI 消息通过 _msg_pid 查找配对的 user 消息的 _mode
// - 兜底返回当前对话模式
function getMsgMode(msg) {
  if (!msg) return getChatMode();
  // 找到配对的消息（user → 直接用；AI → 找配对的 user）
  const conv = getCurrentConv();
  if (!conv) return getChatMode();
  let pairMsg;
  if (msg.role === 'user') {
    pairMsg = msg;
  } else {
    const pid = msg._msg_pid;
    if (pid) pairMsg = conv.messages.find(m => m._msg_id === pid);
  }
  return (pairMsg && pairMsg._mode) ? pairMsg._mode : getChatMode();
}

async function setChatMode(mode) {
  if (!currentConvId) return;
  const conv = getCurrentConv();
  if (!conv) return;
  conv.chatMode = mode;
  conv.updatedAt = Date.now();
  await dbPut(conv);
  updateChatModeUI();
}

function updateChatModeUI() {
  const mode = getChatMode();
  const $btnChatMode = document.getElementById('btnChatMode');

// ==================== 图片格式转换 ====================
function blobToWebPBase64(blob) {
  return new Promise((resolve) => {
    // 先尝试直接读，保留原格式以防 canvas 失败
    const fallbackReader = new FileReader();
    const originalUrl = new Promise(r => {
      fallbackReader.onload = () => r(fallbackReader.result);
      fallbackReader.readAsDataURL(blob);
    });

    const img = new Image();
    const url = URL.createObjectURL(blob);
    img.onload = () => {
      URL.revokeObjectURL(url);
      try {
        const canvas = document.createElement('canvas');
        // 最大 1024 像素等比例缩放
        const MAX = 1024;
        let w = img.naturalWidth, h = img.naturalHeight;
        if (w > MAX || h > MAX) {
          const ratio = Math.min(MAX / w, MAX / h);
          w = Math.round(w * ratio);
          h = Math.round(h * ratio);
        }
        canvas.width = w;
        canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        canvas.toBlob(webpBlob => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.readAsDataURL(webpBlob);
        }, 'image/webp', 0.92);
      } catch (e) {
        // canvas 污染（跨域）等异常，回退原格式
        originalUrl.then(resolve);
      }
    };
    img.onerror = () => originalUrl.then(resolve);
    img.src = url;
  });
}

// ==================== Ref URL ====================
function addRefUrl() {
  const raw = $refUrlInput.value.trim().replace(/"/g, '');
  if (!raw) return;
  const urls = raw.startsWith('data:')
    ? [raw]
    : raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
  for (const url of urls) {
    if (isValidUrl(url) && !refUrls.includes(url)) refUrls.push(url);
  }
  $refUrlInput.value = '';
  renderRefTags();
}
function removeRefUrl(i) { refUrls.splice(i, 1); renderRefTags(); }
function isValidUrl(s) { try { new URL(s); return true; } catch { return false; } }
function renderRefTags() {
  $refUrlTags.innerHTML = refUrls.map((url, i) => `
    <span class="ref-url-tag">
      <img class="ref-thumb" src="${escapeHtml(url)}" alt="参考图" title="${escapeHtml(url)}" referrerpolicy="no-referrer"
           onerror="this.style.display='none';this.nextElementSibling.style.display='none'"
           onclick="openLightbox('${escapeHtml(url)}')" />
      <span class="ref-del" onclick="removeRefUrl(${i})" title="移除">&times;</span>
    </span>`).join('');
}

// ==================== Status ====================
function addPendingRequest(convId) {
  convPendingRequests[convId] = (convPendingRequests[convId] || 0) + 1;
  renderConvList();
  if (convId === currentConvId) updateStatus();
}

function removePendingRequest(convId) {
  convPendingRequests[convId] = Math.max(0, (convPendingRequests[convId] || 1) - 1);
  renderConvList();
  if (convId === currentConvId) updateStatus();
}

function getConvState(convId) {
  return (convPendingRequests[convId] || 0) > 0 ? 'loading' : 'idle';
}

function updateStatus() {
  if (!apiKey) {
    $statusDot.className = 'status-dot offline';
    $statusText.textContent = '请设置 API Key';
    return;
  }
  const state = getConvState(currentConvId);
  switch (state) {
    case 'loading':
      $statusDot.className = 'status-dot loading';
      $statusText.textContent = '等待响应';
      break;
    case 'error':
      $statusDot.className = 'status-dot error';
      $statusText.textContent = '请求异常';
      break;
    default:
      $statusDot.className = 'status-dot';
      $statusText.textContent = '就绪';
  }
}

// ==================== Send ====================
function buildChatMessages(prompt, imageUrls = [], stopIdx = undefined) {
  const conv = getCurrentConv();
  if (!conv) return [{ role: 'user', content: prompt }];

  const messages = [];
  const sys = (conv._sysPrompts?.text || '').trim();
  if (sys) messages.push({ role: 'system', content: sys });

  // 只收集到 stopIdx 为止（默认全部），且仅包含文字对话模式的消息
  const maxIdx = stopIdx !== undefined ? stopIdx : conv.messages.length;
  for (let i = 0; i < maxIdx; i++) {
    const msg = conv.messages[i];
    // 排除生图/生视频模式的消息：检查 _endpoint 是否为 chatEndpoint
    if (!msg.apiBodies || msg.apiBodies._endpoint !== CONFIG.chatEndpoint) continue;

    if (msg.role === 'user') {
      // 历史消息有图片时，构造 content 数组
      const msgImages = msg.refImages || [];
      if (msgImages.length > 0) {
        const content = [{ type: 'text', text: msg.text }];
        msgImages.forEach(url => content.push({ type: 'image_url', image_url: { url } }));
        messages.push({ role: 'user', content });
      } else {
        messages.push({ role: 'user', content: msg.text });
      }
    } else if (msg.role === 'ai' && !msg.isError && msg.text) {
      messages.push({ role: 'assistant', content: msg.text });
    }
  }

  // 当前提交的 prompt（可能带图片）
  if (prompt) {
    if (imageUrls && imageUrls.length > 0) {
      const content = [{ type: 'text', text: prompt }];
      imageUrls.forEach(url => content.push({ type: 'image_url', image_url: { url } }));
      messages.push({ role: 'user', content });
    } else {
      messages.push({ role: 'user', content: prompt });
    }
  }

  // 按上下文提交量截断历史消息（保留 system + 最近 N 轮）
  const rounds = parseInt($chatRounds.value) || 10;
  const sysCount = sys ? 1 : 0;
  const promptCount = prompt ? 1 : 0;
  const historyStart = sysCount;
  const historyEnd = messages.length - promptCount;
  const historyMessages = messages.slice(historyStart, historyEnd);
  const maxHistory = rounds * 2;
  if (historyMessages.length > maxHistory) {
    const keep = historyMessages.slice(-maxHistory);
    const final = [...messages.slice(0, historyStart), ...keep, ...messages.slice(historyEnd)];
    return final;
  }

  return messages;
}

function getSysPromptFor(mode) {
  const conv = getCurrentConv();
  return conv?._sysPrompts?.[mode] || '';
}

// 拼接系统提示词和用户提示词，分隔符为 \n---\n
function concatSysPrompt(sysPrompt, userPrompt) {
  if (!sysPrompt || !sysPrompt.trim()) return userPrompt;
  return `${sysPrompt}\n---\n${userPrompt}`;
}

// 提取用户提示词部分（去掉前缀的系统提示词）
function extractUserPrompt(text) {
  if (!text) return '';
  const idx = text.indexOf('\n---\n');
  return idx >= 0 ? text.substring(idx + 5) : text;
}

function buildRequestBody(prompt, imageUrls, stopIdx = undefined, modeOverride = null) {
  const cMode = modeOverride || getChatMode();

  if (cMode === 'chat') {
    // 对话请求体
    const messages = buildChatMessages(prompt, imageUrls, stopIdx);
    const body = {
      model: $chatModel.value,
      messages: messages,
      temperature: parseFloat($chatTemp.value),
      max_tokens: parseInt($chatMaxTokens.value),
      stream: true,
    };
    if ($chatThinking.checked) {
      body.chat_template_kwargs = { enable_thinking: true };
    }
    return body;
  }

  if (cMode === 'video') {
    // 视频请求体
    const fullPrompt = concatSysPrompt(getSysPromptFor('video'), prompt);
    const model = $videoModel.value;
    const res = $videoRes.value.split('x');
    const body = {
      model, prompt: fullPrompt,
      width: parseInt(res[0]),
      height: parseInt(res[1]),
      num_frames: parseInt(document.getElementById('numFrames').value),
      frame_rate: parseInt(document.getElementById('frameRate').value),
    };
    const seedVal = $seedInput.value.trim();
    if (seedVal) body.seed = parseInt(seedVal, 10);
    if (imageUrls && imageUrls.length > 0) {
      if (imageUrls.length === 1) {
        body.image = imageUrls[0];
      } else {
        body.extra_body = { image: imageUrls };
      }
    }
    return body;
  }

  // 图片请求体
  const fullPrompt = concatSysPrompt(getSysPromptFor('image'), prompt);
  const model = $imageModel.value;
  const body = { model, prompt: fullPrompt, size: $sizeSelect.value, extra_body: { response_format: 'url' } };
  const seedVal = $seedInput.value.trim();
  if (seedVal) body.seed = parseInt(seedVal, 10);
  if (imageUrls && imageUrls.length > 0) {
    body.tags = ['img2img'];
    body.extra_body.image = imageUrls;
  }
  return body;
}

async function sendMessage() {
  const prompt = $promptInput.value.trim();
  if (!prompt) return;

  // 对话模式走流式路径
  if (getChatMode() === 'chat') {
    $promptInput.value = '';
    $promptInput.style.height = 'auto';
    const userRefs = [...refUrls];
    refUrls = [];
    renderRefTags();
    await sendChatMessage(prompt, userRefs);
    return;
  }

  const pendingUrl = $refUrlInput.value.trim();
  if (pendingUrl && isValidUrl(pendingUrl)) addRefUrl();

  const sourceConvId = currentConvId;
  addPendingRequest(sourceConvId);

  const userRefs = [...refUrls];
  const reqBody = buildRequestBody(prompt, userRefs);
  const reqBodyStr = JSON.stringify(reqBody, null, 2);

  // 1. 创建 user 消息（图像/视频模式只存用户输入部分，不含系统提示词）
  const displayPrompt = getChatMode() === 'chat' ? prompt : extractUserPrompt(prompt);
  await addMessageToConv(sourceConvId, 'user', displayPrompt, false, userRefs, [], { requestBody: reqBodyStr, _endpoint: getEndpoint() });

  const conv = conversations.find(c => c.id === sourceConvId);
  const msgPid = conv ? conv.messages[conv.messages.length - 1]._msg_id : null;

  // 2. 立即创建 AI 占位消息（紧跟在 user 消息后面）
  const isVideo = getChatMode() === 'video';
  await addMessageToConv(sourceConvId, 'ai', isVideo ? '\u23f3 正在创建视频任务…' : '\u23f3 正在生成…', false, [], [], { _endpoint: getEndpoint(), _msg_pid: msgPid });
  scrollToBottom();

  // 3. 清空输入
  $promptInput.value = '';
  $promptInput.style.height = 'auto';
  refUrls = [];
  renderRefTags();

  // 首次发言自动命名
  if (conv && conv.name.startsWith('新对话 ') && conv.messages.length <= 3) {
    conv.name = prompt.substring(0, 30) + (prompt.length > 30 ? '…' : '');
    conv.updatedAt = Date.now();
    await dbPut(conv);
    if (sourceConvId === currentConvId) updateConvNameDisplay();
    renderConvList();
  }

  // 4. 调用 API 并原地更新占位消息
  try {
    const result = await callAgnesAPI(prompt, userRefs);
    removePendingRequest(sourceConvId);

    // 找到占位 AI 消息（通过 _msg_pid）
    const convNow = conversations.find(c => c.id === sourceConvId);
    if (!convNow) return;
    const aiMsg = convNow.messages.find(m => m._msg_pid === msgPid);
    if (!aiMsg) return;

    aiMsg.apiBodies = {
      requestBody: result.requestBody,
      responseBody: result.responseBody,
      _endpoint: getEndpoint(),
    };
    aiMsg.time = new Date().toISOString();
    aiMsg.isError = false;

    if (isVideo) {
      const taskId = result.data?.task_id;
      const videoId = result.data?.video_id;
      if (taskId) {
        aiMsg.text = '\u2705 视频任务已提交';
        aiMsg.apiBodies.videoTaskId = taskId;
        aiMsg.apiBodies.videoId = videoId || taskId;
        aiMsg.apiBodies.videoStatus = 'queued';
        aiMsg.apiBodies.videoProgress = 0;
        // 自动轮询
        if (sourceConvId === currentConvId) {
          const idx = convNow.messages.indexOf(aiMsg);
          aiMsg.apiBodies._autoTimer = setTimeout(() => {
            refreshVideoTask(sourceConvId, idx, taskId);
          }, 10000);
        }
      } else {
        aiMsg.text = '\u26a0\ufe0f 视频任务创建失败，未返回 task_id';
        aiMsg.isError = true;
      }
    } else {
      const imgArray = result.data?.data;
      if (imgArray && imgArray.length > 0) {
        const genUrls = imgArray.map(i => i.url).filter(Boolean);
        aiMsg.genImages = genUrls;
        aiMsg.text = genUrls.length > 1 ? `\u2705 已为你生成 ${genUrls.length} 张图像：` : '\u2705 已为你生成图像：';
      } else {
        aiMsg.text = '\u26a0\ufe0f API 返回了空结果。';
        aiMsg.isError = true;
      }
    }

    convNow.updatedAt = Date.now();
    await dbPut(convNow);

    // 局部更新 DOM
    if (sourceConvId === currentConvId) {
      const aiIdx = convNow.messages.indexOf(aiMsg);
      const row = $chatMessages.querySelector(`[data-msg-idx="${aiIdx}"]`);
      if (row) {
        const bubble = row.querySelector('.bubble');
        if (bubble) { aiMsg._convId = currentConvId; aiMsg._idx = aiIdx; bubble.innerHTML = buildBubbleContent(aiMsg); }
      }
    }
    renderConvList();
  } catch (err) {
    removePendingRequest(sourceConvId);
    const errMsg = err.message || '未知错误';

    const convNow = conversations.find(c => c.id === sourceConvId);
    if (!convNow) return;
    const aiMsg = convNow.messages.find(m => m._msg_pid === msgPid);
    if (!aiMsg) return;

    aiMsg.text = `\u274c 生成失败：${escapeHtml(errMsg)}`;
    aiMsg.isError = true;
    aiMsg.apiBodies = { requestBody: err.requestBody || '', responseBody: err.responseBody || escapeHtml(errMsg), _endpoint: getEndpoint() };
    aiMsg.time = new Date().toISOString();

    convNow.updatedAt = Date.now();
    await dbPut(convNow);

    if (sourceConvId === currentConvId) {
      const aiIdx = convNow.messages.indexOf(aiMsg);
      const row = $chatMessages.querySelector(`[data-msg-idx="${aiIdx}"]`);
      if (row) {
        const bubble = row.querySelector('.bubble');
        if (bubble) { aiMsg._convId = currentConvId; aiMsg._idx = aiIdx; bubble.innerHTML = buildBubbleContent(aiMsg); }
      }
    }
    renderConvList();
  }
}

function getEndpoint() {
  const mode = getChatMode();
  if (mode === 'video') return CONFIG.videoEndpoint;
  if (mode === 'chat') return CONFIG.chatEndpoint;
  return CONFIG.imageEndpoint;
}

async function sendChatMessage(prompt, imageUrls = []) {
  const conv = getCurrentConv();
  if (!conv) return;
  const sourceConvId = currentConvId;
  addPendingRequest(sourceConvId);

  const reqBody = buildRequestBody(prompt, imageUrls);
  const reqBodyStr = JSON.stringify(reqBody, null, 2);
  const endpoint = CONFIG.chatEndpoint;

  // 追加 user 消息并持久化（refImages 用于UI渲染缩略图）
  await addMessageToConv(sourceConvId, 'user', prompt, false, imageUrls, [], { requestBody: reqBodyStr, _endpoint: endpoint });
  const msgPid = conv.messages[conv.messages.length - 1]._msg_id;

  const streamId = 'stream_' + Date.now();
  await addMessageToConv(sourceConvId, 'ai', '', false, [], [], { _endpoint: endpoint, _msg_pid: msgPid, _streamId: streamId, _streaming: true });

  renderAllMessages();
  scrollToBottom();

  await streamChatResponse(msgPid, streamId, sourceConvId, endpoint, reqBody);
}

// SSE 流式请求（供 sendChatMessage 和 regenerateFromUser 共用）
async function streamChatResponse(msgPid, streamId, sourceConvId, endpoint, reqBody) {
  const conv = conversations.find(c => c.id === sourceConvId);
  if (!conv) return;

  currentAbortController = new AbortController();

  let response;
  try {
    response = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${getApiKey()}` },
      body: JSON.stringify(reqBody),
      signal: currentAbortController.signal,
    });
  } catch (err) {
    removePendingRequest(sourceConvId);
    currentAbortController = null;
    if (err.name === 'AbortError') {
      const aiMsg = conv.messages.find(m => m._msg_pid === msgPid);
      if (aiMsg) { aiMsg.apiBodies._streaming = false; aiMsg.apiBodies._incomplete = true; await dbPut(conv); }
    } else {
      const aiMsg = conv.messages.find(m => m._msg_pid === msgPid);
      if (aiMsg) { aiMsg.text = '网络连接失败，请检查网络后重试'; aiMsg.isError = true; aiMsg.apiBodies._streaming = false; await dbPut(conv); }
    }
    renderAllMessages();
    return;
  }

  if (!response.ok) {
    removePendingRequest(sourceConvId);
    currentAbortController = null;
    const aiMsg = conv.messages.find(m => m._msg_pid === msgPid);
    if (aiMsg) {
      const status = response.status;
      aiMsg.apiBodies._streaming = false;
      aiMsg.isError = true;
      if (status === 401) aiMsg.text = 'API Key 无效，请检查配置';
      else if (status === 429) aiMsg.text = '请求过于频繁，请稍后重试';
      else if (status >= 500) aiMsg.text = `服务暂时不可用 (HTTP ${status})，请稍后重试`;
      else aiMsg.text = `请求失败 (HTTP ${status})`;
      await dbPut(conv);
    }
    renderAllMessages();
    return;
  }

  // SSE 流式读取
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let fullText = '';
  let thinkingText = '';
  let buffer = '';
  let hasThinking = false;
  let thinkingActive = false;  // thinking 是否正在进行中
  let usageTokens = null;      // { prompt_tokens, completion_tokens, total_tokens }

  try {
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') continue;
        try {
          const json = JSON.parse(data);
          const content = json.choices?.[0]?.delta?.content || '';
          const reasoning = json.choices?.[0]?.delta?.reasoning_content || '';
          fullText += content;
          // 提取 token 统计（通常出现在最后一个 chunk）
          if (json.usage) {
            usageTokens = {
              prompt_tokens: json.usage.prompt_tokens || 0,
              completion_tokens: json.usage.completion_tokens || 0,
              total_tokens: json.usage.total_tokens || 0,
            };
          }
          if (reasoning) {
            hasThinking = true;
            thinkingActive = true;
            thinkingText += reasoning;
            const thinkingEl = document.querySelector(`[data-thinking-id="${msgPid}"]`);
            if (thinkingEl) {
              thinkingEl.innerHTML = marked.parse(thinkingText);
              const block = thinkingEl.closest('.thinking-block');
              if (block) {
                const countEl = block.querySelector('.count');
                if (countEl) countEl.textContent = `(${thinkingText.length} 字)`;
              }
            } else {
              const bubbleEl = document.querySelector(`.chat-bubble-ai[data-stream-id="${streamId}"]`);
              if (bubbleEl) {
                const thinkingId = 'think_' + msgPid;
                const block = document.createElement('div');
                block.className = 'thinking-block';
                block.innerHTML = `
                  <div class="thinking-header" onclick="toggleThinkingBlock('${thinkingId}')">
                    <span class="arrow open" id="${thinkingId}-arrow">&#9654;</span>
                    <span>深度思考</span>
                    <span class="count">(${thinkingText.length} 字)</span>
                  </div>
                  <div class="thinking-content open" id="${thinkingId}" data-thinking-id="${msgPid}">
                    <div class="md-content">${marked.parse(thinkingText)}</div>
                  </div>
                `;
                bubbleEl.insertBefore(block, bubbleEl.firstChild);
              }
            }
          }
          // 主内容开始输出时，自动折叠 thinking 块
          if (content && thinkingActive) {
            thinkingActive = false;
            const thinkId = 'think_' + msgPid;
            const contentEl = document.getElementById(thinkId);
            const arrowEl = document.getElementById(thinkId + '-arrow');
            if (contentEl) contentEl.classList.remove('open');
            if (arrowEl) arrowEl.classList.remove('open');
          }
          const bubbleEl = document.querySelector(`.chat-bubble-ai[data-stream-id="${streamId}"]`);
          if (bubbleEl) {
            // 首次有内容时，移除初始的外置光标
            if (fullText && !bubbleEl.querySelector('.md-content')) {
              const outerCursor = bubbleEl.querySelector('.stream-cursor');
              if (outerCursor) outerCursor.remove();
            }
            // 实时 Markdown 渲染
            let mdEl = bubbleEl.querySelector('.md-content');
            if (!mdEl) {
              mdEl = document.createElement('div');
              mdEl.className = 'md-content';
              bubbleEl.appendChild(mdEl);
            }
            mdEl.innerHTML = marked.parse(fullText) + '<span class="stream-cursor">|</span>';
          }
        } catch {}
      }
    }
  } catch (err) {
    if (err.name === 'AbortError') {
    } else {
      const aiMsg = conv.messages.find(m => m._msg_pid === msgPid);
      if (aiMsg && !fullText) { aiMsg.isError = true; aiMsg.text = '读取响应失败'; }
    }
  }

  // 流结束，最终保存
  removePendingRequest(sourceConvId);
  currentAbortController = null;
  const aiMsg = conv.messages.find(m => m._msg_pid === msgPid);
  if (aiMsg) {
    aiMsg.text = fullText || aiMsg.text || '(空响应)';
    aiMsg.apiBodies._streaming = false;
    aiMsg.apiBodies._streamId = null;
    if (hasThinking) {
      aiMsg.apiBodies._hasThinking = true;
      aiMsg.apiBodies._thinkingText = thinkingText;
    }
    if (usageTokens) {
      aiMsg.apiBodies._usage = usageTokens;
    }
    aiMsg.time = new Date().toISOString();
    await dbPut(conv);
  }
  renderAllMessages();
}

async function callAgnesAPI(prompt, imageUrls) {
  const body = buildRequestBody(prompt, imageUrls);
  const requestBodyStr = JSON.stringify(body, null, 2);
  const endpoint = getEndpoint();
  const resp = await fetch(endpoint, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${getApiKey()}`, 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  let responseBody;
  try { responseBody = await resp.json(); } catch { responseBody = { raw: await resp.text() }; }
  if (!resp.ok) {
    const err = new Error(responseBody?.detail || responseBody?.error?.message || `HTTP ${resp.status}`);
    err.status = resp.status;
    err.requestBody = requestBodyStr;
    err.responseBody = JSON.stringify(responseBody, null, 2);
    throw err;
  }
  return { requestBody: requestBodyStr, responseBody: JSON.stringify(responseBody, null, 2), data: responseBody };
}

// ==================== Messages ====================
// 便捷版：写入当前对话
async function addMessage(role, text, isError = false, refImages = [], genImages = [], apiBodies = null) {
  return addMessageToConv(currentConvId, role, text, isError, refImages, genImages, apiBodies);
}

// 核心版：写入指定对话
async function addMessageToConv(convId, role, text, isError = false, refImages = [], genImages = [], apiBodies = null) {
  const conv = conversations.find(c => c.id === convId);
  if (!conv) return;
  const msg = { role, text, isError, refImages, genImages, time: new Date().toISOString(), apiBodies };
  // 消息关联：user 消息生成 _msg_id，AI 消息记录 _msg_pid
  if (role === 'user') {
    msg._msg_id = Date.now();
    msg._mode = getChatMode();   // 记住本轮次使用的生成模式
  }
  if (apiBodies && apiBodies._msg_pid) {
    msg._msg_pid = apiBodies._msg_pid;
    delete apiBodies._msg_pid; // 不存入 apiBodies 中以避免在代码块中显示
  }
  conv.messages.push(msg);
  conv.updatedAt = Date.now();
  await dbPut(conv);
  if (convId === currentConvId) {
    renderAllMessages();
  }
  renderConvList();
}

function buildBubbleContent(msg) {
  if (msg.apiBodies && msg.apiBodies.videoTaskId) {
    console.log('[buildBubbleContent] idx=' + msg._idx + ' taskId=' + msg.apiBodies.videoTaskId.slice(0,12) + ' status=' + msg.apiBodies.videoStatus, new Date().toISOString());
  }
  const isUser = msg.role === 'user';
  let html = '';

  // 根据消息自身的模式渲染（而非全局对话模式）
  const msgMode = getMsgMode(msg);
  if (msgMode === 'chat') {
    const streamId = msg.apiBodies?._streamId || '';
    const streaming = msg.apiBodies?._streaming === true;

    // 判断消息是否实际上是图片/视频消息（通过内容特征判断）
    const isImageOrVideoMsg = (msg.genImages && msg.genImages.length > 0) ||
                              (msg.apiBodies && msg.apiBodies.videoTaskId);

    // ========== 是图片/视频消息：在 Chat 模式下仍按原有方式渲染 ==========
    if (isImageOrVideoMsg) {
      // 参考图
      if (msg.refImages && msg.refImages.length > 0) {
        html += '<div class="ref-images">';
        msg.refImages.forEach(url => {
          html += `<img src="${escapeHtml(url)}" alt="参考图" referrerpolicy="no-referrer" onerror="this.style.display='none'" onclick="openLightbox('${escapeHtml(url)}')"/>`;
        });
        html += '</div>';
      }
      // 文本
      html += `<div class="msg-text">${msg.text}</div>`;
      // 请求体/响应体折叠
      if (msg.apiBodies?.requestBody) {
        const uid = codeId();
        html += `<button class="code-toggle" onclick="toggleCodeBlock('${uid}')"><span class="arrow" id="${uid}-arrow">&#9654;</span> 请求体 (${msg.apiBodies.requestBody.length} 字符)</button>`;
        html += `<div class="code-block" id="${uid}"><div class="code-label">POST ${escapeHtml(msg.apiBodies._endpoint || '')}</div>${escapeHtml(msg.apiBodies.requestBody)}</div>`;
      }
      if (msg.apiBodies?.responseBody) {
        const uid = codeId();
        html += `<button class="code-toggle" onclick="toggleCodeBlock('${uid}')"><span class="arrow" id="${uid}-arrow">&#9654;</span> 响应体</button>`;
        html += `<div class="code-block" id="${uid}"><div class="code-label">RESPONSE</div>${escapeHtml(msg.apiBodies.responseBody)}</div>`;
      }
      // 生成图
      if (msg.genImages && msg.genImages.length > 0) {
        html += '<div class="gen-image-wrapper"><span class="gen-label">&#x1f5bc; 生成结果</span>';
        msg.genImages.forEach(url => {
          html += `<img src="${escapeHtml(url)}" alt="生成图片" class="gen-image" referrerpolicy="no-referrer" onerror="this.style.display='none'" onclick="openLightbox('${escapeHtml(url)}')"/>`;
        });
        html += '</div>';
      }
      // 视频任务
      if (msg.apiBodies && msg.apiBodies.videoTaskId) {
        const vt = msg.apiBodies;
        html += '<div class="video-task">';
        if (vt.videoStatus === 'completed' && vt.videoUrl) {
          html += `<div class="gen-label">&#x1f3ac; 视频已生成</div>`;
          html += `<div class="video-player"><video controls src="${escapeHtml(vt.videoUrl)}"></video></div>`;
        } else if (vt.videoStatus === 'failed') {
          html += `<div class="msg-text" style="color:var(--error);">&#x274c; 视频生成失败</div>`;
        } else {
          const pct = vt.videoProgress || 0;
          const statusText = vt.videoStatus === 'queued' ? '排队等待中' : '正在生成视频';
          html += `<div class="msg-text">&#x23f3; ${statusText}（task: ${escapeHtml(vt.videoTaskId.slice(0, 12))}…）</div>`;
          if (pct > 0) {
            html += `<div class="video-progress-bar"><div class="video-progress-fill" style="width:${pct}%"></div></div>`;
            html += `<div style="font-size:10px;color:var(--text-muted);margin-top:2px">进度 ${pct}%</div>`;
          }
          html += '<div style="display:flex;align-items:center;gap:6px;white-space:nowrap">';
          html += `<button class="btn-video-refresh" onclick="event.stopPropagation();refreshVideoTask('${msg._convId}',${msg._idx},'${vt.videoTaskId}')">&#x1f504; 刷新状态</button>`;
          html += `<button class="btn-video-refresh" title="每10秒刷新一次" onclick="event.stopPropagation();toggleVideoPause('${msg._convId}',${msg._idx})">${vt.videoPaused ? '&#x25b6; 恢复自刷' : '&#x23f8; 暂停自刷'}</button>`;
          html += '</div>';
        }
        html += '</div>';
      }
      // 紧凑信息行：时间靠左，按钮靠右
      html += '<div class="msg-compact-bar">';
      html += `<span class="msg-time">${formatTime(new Date(msg.time))}</span>`;
      html += '<div class="msg-actions" style="margin-top:0;">';
      html += `<button class="btn-act" title="复制图片/视频URL" onclick="event.stopPropagation();copyGenUrl(this)">&#x1f4cb; 复制URL</button>`;
      html += `<button class="btn-act" title="重新生成" onclick="event.stopPropagation();regenerateFromUser('${msg._convId}',${msg._idx})">&#x1f504;</button>`;
      html += '</div>';
      html += '</div>';
      return html;
    }

    // ========== 用户消息（与生图/生视频模式完全一致）==========
    if (isUser) {
      // 显示参考图缩略图
      if (msg.refImages && msg.refImages.length > 0) {
        html += '<div class="ref-images">';
        msg.refImages.forEach(url => {
          html += `<img src="${escapeHtml(url)}" alt="参考图" referrerpolicy="no-referrer" onerror="this.style.display='none'" onclick="openLightbox('${escapeHtml(url)}')"/>`;
        });
        html += '</div>';
      }
      // 提示词文本
      html += `<div class="msg-text" onclick="event.stopPropagation();startEditPrompt('${msg._convId}',${msg._idx})">${msg.text}</div>`;
      // 请求体折叠（单独一行）
      if (msg.apiBodies?.requestBody) {
        const uid = codeId();
        html += `<button class="code-toggle" onclick="toggleCodeBlock('${uid}')"><span class="arrow" id="${uid}-arrow">&#9654;</span> 请求体 (${msg.apiBodies.requestBody.length} 字符)</button>`;
        html += `<div class="code-block" id="${uid}"><div class="code-label">POST ${escapeHtml(msg.apiBodies._endpoint || '')}</div>${escapeHtml(msg.apiBodies.requestBody)}</div>`;
      }
      // 紧凑信息行：时间靠左，操作按钮靠右
      const t = new Date(msg.time);
      html += '<div class="msg-compact-bar">';
      html += `<span class="msg-time">${formatTime(t)}</span>`;
      html += '<div class="msg-actions" style="margin-top:0;">';
      html += `<button class="btn-act" title="复制提示词" onclick="event.stopPropagation();copyUserPrompt('${msg._convId}',${msg._idx})">&#x1f4cb;</button>`;
      html += `<button class="btn-del" title="删除此请求和对应响应" onclick="event.stopPropagation();deleteMsgPair('${msg._convId}',${msg._idx})">&#x1f5d1;</button>`;
      html += `<button class="btn-act" title="重新生成" onclick="event.stopPropagation();regenerateFromUser('${msg._convId}',${msg._idx})">&#x1f504;</button>`;
      html += '</div>';
      html += '</div>';
      return html;
    }

    // ========== AI 消息（纯对话气泡，无按钮）==========
    let text = msg.text || '';
    if (streaming && streamId) {
      // 流式中不从 DOM 回读（内容由 SSE handler 的 innerHTML 维护）
      // 仅在流结束后 msg.text 才有完整值
    }

    html += `<div class="chat-bubble chat-bubble-ai" data-stream-id="${streamId}">`;

    // Thinking 区块（流式输出过程中也显示）
    const hasThinking = msg.apiBodies?._hasThinking === true;
    const thinkingText = msg.apiBodies?._thinkingText || '';
    if (hasThinking) {
      const thinkingId = 'think_' + (msg._msg_pid || Date.now());
      const thinkingLen = thinkingText.length;
      html += `<div class="thinking-block">`;
      html += `<div class="thinking-header" onclick="toggleThinkingBlock('${thinkingId}')">`;
      html += `<span class="arrow" id="${thinkingId}-arrow">&#9654;</span>`;
      html += `<span>深度思考</span>`;
      html += `<span class="count">(${thinkingLen} 字)</span>`;
      html += `</div>`;
      html += `<div class="thinking-content" id="${thinkingId}" data-thinking-id="${msg._msg_pid}">
        <div class="md-content">${marked.parse(thinkingText)}</div>
      </div>`;
      html += `</div>`;
    }

    if (msg.isError) {
      html += `<div style="color:var(--error);">${escapeHtml(text)}</div>`;
    } else if (streaming) {
      // 流式中：空容器 + 光标，SSE handler 实时填充 Markdown
      html += '<div class="md-content"></div><span class="stream-cursor">|</span>';
    } else {
      try {
        html += `<div class="md-content">${marked.parse(text)}</div>`;
      } catch {
        html += `<div class="md-content">${escapeHtml(text)}</div>`;
      }
    }
    html += '</div>';

    // AI 消息底部：时间靠左，字数+复制按钮靠右
    const charCount = (msg.text || '').length;
    html += `<div class="msg-meta" style="display:flex;align-items:center;justify-content:space-between;margin-top:4px;padding:0 12px;">`;
    html += `<span class="msg-time">${formatTime(new Date(msg.time))}</span>`;
    html += '<span style="display:flex;align-items:center;gap:6px;">';
    if (charCount > 0) {
      html += `<span style="font-size:11px;color:var(--text-muted);">(${charCount}字)</span>`;
    }
    html += `<button class="msg-action-btn" onclick="copyAiMessage(this)">&#x1f4cb; 复制内容</button>`;
    html += '</span>';
    html += `</div>`;

    return html;
  }

  if (msg.refImages && msg.refImages.length > 0) {
    html += '<div class="ref-images">';
    msg.refImages.forEach(url => {
      html += `<img src="${escapeHtml(url)}" alt="参考图" referrerpolicy="no-referrer" onerror="this.style.display='none'" onclick="openLightbox('${escapeHtml(url)}')"/>`;
    });
    html += '</div>';
  }

  if (isUser) {
    html += `<div class="msg-text" onclick="event.stopPropagation();startEditPrompt('${msg._convId}',${msg._idx})">${msg.text}</div>`;
  } else {
    html += `<div class="msg-text">${msg.text}</div>`;
  }

  if (msg.apiBodies && !isUser) {
    if (msg.apiBodies.requestBody) {
      const uid = codeId();
      html += `<button class="code-toggle" onclick="toggleCodeBlock('${uid}')"><span class="arrow" id="${uid}-arrow">&#9654;</span> 请求体 (${msg.apiBodies.requestBody.length} 字符)</button>`;
      html += `<div class="code-block" id="${uid}"><div class="code-label">POST ${escapeHtml(msg.apiBodies._endpoint || '')}</div>${escapeHtml(msg.apiBodies.requestBody)}</div>`;
    }
    if (msg.apiBodies.responseBody) {
      const uid = codeId();
      html += `<button class="code-toggle" onclick="toggleCodeBlock('${uid}')"><span class="arrow" id="${uid}-arrow">&#9654;</span> 响应体 (${msg.apiBodies.responseBody.length} 字符)</button>`;
      html += `<div class="code-block" id="${uid}"><div class="code-label">${msg.isError ? 'ERROR RESPONSE' : 'RESPONSE'}</div>${escapeHtml(msg.apiBodies.responseBody)}</div>`;
    }
  }

  if (msg.genImages && msg.genImages.length > 0) {
    html += '<div class="gen-image-wrapper"><span class="gen-label">&#x1f5bc; 生成结果</span>';
    msg.genImages.forEach(url => {
      html += `<img src="${escapeHtml(url)}" alt="生成图片" class="gen-image" referrerpolicy="no-referrer" onerror="this.style.display='none'" onclick="openLightbox('${escapeHtml(url)}')"/>`;
    });
    html += '</div>';
  }

  // 视频任务渲染
  if (msg.apiBodies && msg.apiBodies.videoTaskId) {
    const vt = msg.apiBodies;
    html += '<div class="video-task">';
    if (vt.videoStatus === 'completed' && vt.videoUrl) {
      html += `<div class="gen-label">&#x1f3ac; 视频已生成</div>`;
      html += `<div class="video-player"><video controls src="${escapeHtml(vt.videoUrl)}"></video></div>`;
    } else if (vt.videoStatus === 'failed') {
      html += `<div class="msg-text" style="color:var(--error);">&#x274c; 视频生成失败</div>`;
    } else {
      const pct = vt.videoProgress || 0;
      const statusText = vt.videoStatus === 'queued' ? '排队等待中' : '正在生成视频';
      html += `<div class="msg-text">&#x23f3; ${statusText}（task: ${escapeHtml(vt.videoTaskId.slice(0, 12))}…）</div>`;
      if (pct > 0) {
        html += `<div class="video-progress-bar"><div class="video-progress-fill" style="width:${pct}%"></div></div>`;
        html += `<div style="font-size:10px;color:var(--text-muted);margin-top:2px">进度 ${pct}%</div>`;
      }
      html += '<div style="display:flex;align-items:center;gap:6px;white-space:nowrap">';
      html += `<button class="btn-video-refresh" onclick="event.stopPropagation();refreshVideoTask('${msg._convId}',${msg._idx},'${vt.videoTaskId}')">&#x1f504; 刷新状态</button>`;
      html += `<button class="btn-video-refresh" title="每10秒刷新一次" onclick="event.stopPropagation();toggleVideoPause('${msg._convId}',${msg._idx})">${vt.videoPaused ? '&#x25b6; 恢复自刷' : '&#x23f8; 暂停自刷'}</button>`;
      html += '</div>';
    }
    html += '</div>';
  }

  if (isUser) {
    // 请求体折叠（单独一行）
    if (msg.apiBodies?.requestBody) {
      const uid = codeId();
      html += `<button class="code-toggle" onclick="toggleCodeBlock('${uid}')"><span class="arrow" id="${uid}-arrow">&#9654;</span> 请求体 (${msg.apiBodies.requestBody.length} 字符)</button>`;
      html += `<div class="code-block" id="${uid}"><div class="code-label">POST ${escapeHtml(msg.apiBodies._endpoint || '')}</div>${escapeHtml(msg.apiBodies.requestBody)}</div>`;
    }
    // 紧凑信息行：时间靠左，按钮靠右
    const t = new Date(msg.time);
    html += '<div class="msg-compact-bar">';
    html += `<span class="msg-time">${formatTime(t)}</span>`;
    html += '<div class="msg-actions" style="margin-top:0;">';
    html += `<button class="btn-act" title="复制提示词" onclick="event.stopPropagation();copyUserPrompt('${msg._convId}',${msg._idx})">&#x1f4cb;</button>`;
    html += `<button class="btn-del" title="删除此请求和对应响应" onclick="event.stopPropagation();deleteMsgPair('${msg._convId}',${msg._idx})">&#x1f5d1;</button>`;
    html += `<button class="btn-act" title="重新生成" onclick="event.stopPropagation();regenerateFromUser('${msg._convId}',${msg._idx})">&#x1f504;</button>`;
    html += '</div>';
    html += '</div>';
  } else {
    // AI 消息：时间 + 复制URL
    const t = new Date(msg.time);
    html += '<div class="msg-compact-bar">';
    html += `<span class="msg-time">${formatTime(t)}</span>`;
    html += '<div class="msg-actions" style="margin-top:0;">';
    html += `<button class="btn-act" title="复制图片/视频URL" onclick="event.stopPropagation();copyGenUrl(this)">&#x1f4cb; 复制URL</button>`;
    html += '</div>';
    html += '</div>';
  }

  return html;
}

function scrollToBottom() {
